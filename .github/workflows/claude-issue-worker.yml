name: claude-issue-worker.yml
on:
  issue_comment:
    types: [created]

jobs:
  claude-fix:
    # Only run on issue comments (not PR comments) by YOU
    if: |
      github.event.issue.pull_request == null &&
      github.event.comment.user.login == 'Draggon01' &&
      contains(github.event.comment.body, '@claude')

    runs-on: [self-hosted, pi, claude]

    permissions:
      contents: write
      issues: write
      pull-requests: write

    timeout-minutes: 30   # Hard cap on run time = implicit cost cap

    steps:
      - name: Checkout repo to external drive
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code on issue
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          TRIGGER_COMMENT: ${{ github.event.comment.body }}
          REPO: ${{ github.repository }}
        run: |
          cd $GITHUB_WORKSPACE

          git config user.name "Claude Bot"
          git config user.email "claude-bot@noreply"

          BRANCH="claude/fix-issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH"

          # Build prompt
          PROMPT="You are working on the GitHub repository '${REPO}'
          and are required to track your work with 'git add -A && git commit -m \"EX-${ISSUE_NUMBER}: description\"' 
          even before your final response to prevent workloss after running into limits, priotice commits over perfection everyting at first.

          IMPORTANT: Read CLAUDE.md in the repo root first before doing anything else. It contains essential project information that will save you time.
          
          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Issue description:
          ${ISSUE_BODY}

          Trigger comment:
          ${TRIGGER_COMMENT}

          Instructions:
          1. Analyze the issue carefully.
          2. Implement a fix. Write clean, idiomatic code.
          3. Add or update tests if applicable.
          4. Commit your changes with a descriptive commit message referencing #${ISSUE_NUMBER}.
          5. Do NOT push or create a PR yourself — the workflow handles that.
          6. If you discover anything useful about the project structure, conventions, or gotchas that would help future runs, append it to CLAUDE.md under a '## Learned' section and commit that too.

          Work only within this repository. Do not modify unrelated files."

          # Run Claude Code headless, max 15 turns to limit cost
          claude -p "$PROMPT" \
            --max-turns 25 \
            --allowedTools "Edit,MultiEdit,Write,Read,Bash,Grep,Glob" \
            --output-format text \
            > /tmp/claude-output.txt 2>&1

          echo "=== Claude output ==="
          cat /tmp/claude-output.txt
      - name: Commit any uncommitted Claude changes
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          cd $GITHUB_WORKSPACE
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "fix: Claude changes for issue #${ISSUE_NUMBER}"
          fi
      - name: Push branch and open PR
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          cd $GITHUB_WORKSPACE
          BRANCH="claude/fix-issue-${ISSUE_NUMBER}"

          git config user.name "Claude Bot"
          git config user.email "claude-bot@noreply"

          DEFAULT_BRANCH=$(git remote show origin | grep 'HEAD branch' | awk '{print $NF}')
          echo "Default branch: $DEFAULT_BRANCH"
          
          COMMITS_AHEAD=$(git rev-list --count origin/${DEFAULT_BRANCH}..HEAD)
          echo "Commits ahead: $COMMITS_AHEAD"

          # Only push if there are actual changes
          if [ "$COMMITS_AHEAD" -eq 0 ]; then
            echo "No changes made by Claude."
            gh issue comment "$ISSUE_NUMBER" \
              --body "🤖 Claude analyzed this issue but made no code changes. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
            exit 0
          fi

          git push origin "$BRANCH"

          gh pr create \
            --title "EX-${ISSUE_NUMBER}: resolve issue #${ISSUE_TITLE}" \
            --body "## Automated fix for #${ISSUE_NUMBER}

          This PR was generated by Claude Code in response to a trigger comment on the issue.

          **Please review carefully before merging.**

          Closes #${ISSUE_NUMBER}" \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH"
